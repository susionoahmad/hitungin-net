version: '3.8'
services:

  # PHP Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: toolkeuangan-backend
    container_name: toolkeuangan-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
    networks:
      - toolkeuangan-network

  # Nginx Service
  webserver:
    image: nginx:alpine
    container_name: toolkeuangan-webserver
    restart: unless-stopped
    tty: true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - toolkeuangan-network

  # MySQL Service
  db:
    image: mysql:8.0
    container_name: toolkeuangan-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: tool_keuangan
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_PASSWORD: db_password
      MYSQL_USER: db_user
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - toolkeuangan-network

# Docker Networks
networks:
  toolkeuangan-network:
    driver: bridge

# Volumes
volumes:
  dbdata:
    driver: local
